<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="China Travel Hub — personal trip planner for a solo trip across China">
  <title>China Travel Hub</title>

  <!-- Styles -->
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/nav.css">
  <link rel="stylesheet" href="css/overview.css">
  <link rel="stylesheet" href="css/city.css">
  <link rel="stylesheet" href="css/expenses.css">
  <link rel="stylesheet" href="css/reminders.css">
</head>
<body>

  <main id="app">

    <!-- ── Tab 1: Overview ─────────────────────────────── -->
    <section
      id="tab-overview"
      class="tab-panel"
      role="tabpanel"
      aria-labelledby="nav-overview"
    >
      <!-- Context-aware header (planning or travel mode) -->
      <div id="overview-header"></div>
      <!-- City cards grid -->
      <div id="city-cards-grid"></div>
    </section>

    <!-- ── City page (sub-view inside Overview) ────────── -->
    <section
      id="city-page"
      class="city-page hidden"
      aria-label="City detail page"
    >
      <div id="city-page-content"></div>
    </section>

    <!-- ── Tab 2: Expenses ─────────────────────────────── -->
    <section
      id="tab-expenses"
      class="tab-panel hidden"
      role="tabpanel"
      aria-labelledby="nav-expenses"
    >
      <div id="expenses-content">
        <div class="empty-state">
          <div class="empty-state-icon" aria-hidden="true">💰</div>
          <p class="empty-state-message">Expenses coming soon.</p>
          <p class="empty-state-sub">This tab will be built in a future session.</p>
        </div>
      </div>
    </section>

    <!-- ── Tab 3: Reminders ────────────────────────────── -->
    <section
      id="tab-reminders"
      class="tab-panel hidden"
      role="tabpanel"
      aria-labelledby="nav-reminders"
    >
      <div id="reminders-content">
        <div class="empty-state">
          <div class="empty-state-icon" aria-hidden="true">🔔</div>
          <p class="empty-state-message">Reminders coming soon.</p>
          <p class="empty-state-sub">This tab will be built in a future session.</p>
        </div>
      </div>
    </section>

  </main>

  <!-- ── Offline banner ──────────────────────────────────── -->
  <div
    id="offline-banner"
    class="offline-banner hidden"
    role="alert"
    aria-live="polite"
  >
    Working offline — changes will sync when connected
  </div>

  <!-- ── Floating bottom nav bar ─────────────────────────── -->
  <nav class="bottom-nav" role="tablist" aria-label="Main navigation">

    <button
      class="nav-tab active"
      id="nav-overview"
      role="tab"
      aria-selected="true"
      aria-controls="tab-overview"
      data-tab="overview"
    >
      <span class="nav-icon" aria-hidden="true">🗺</span>
      <span class="nav-label">Overview</span>
    </button>

    <button
      class="nav-tab"
      id="nav-expenses"
      role="tab"
      aria-selected="false"
      aria-controls="tab-expenses"
      data-tab="expenses"
    >
      <span class="nav-icon" aria-hidden="true">💰</span>
      <span class="nav-label">Expenses</span>
    </button>

    <button
      class="nav-tab"
      id="nav-reminders"
      role="tab"
      aria-selected="false"
      aria-controls="tab-reminders"
      data-tab="reminders"
    >
      <span class="nav-icon" aria-hidden="true">🔔</span>
      <span class="nav-label">Reminders</span>
    </button>

  </nav>

  <!-- SortableJS (global, used for drag-and-drop in city pages) -->
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>

  <!-- App entry point (ES module) -->
  <script type="module" src="js/app.js"></script>

</body>
</html>
